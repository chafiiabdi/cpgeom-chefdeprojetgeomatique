<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 320" role="img" aria-labelledby="title desc">
  <title id="title">Expertise technique en géomatique</title>
  <desc id="desc">Bandeau présentant les outils de géomatique : QGIS, ArcGIS, Webmapping, Server, PostgreSQL, PostGIS, GDAL, LiDAR, Python, PyQGIS et ESRI.</desc>
